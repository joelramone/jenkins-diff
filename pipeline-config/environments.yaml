# Definición de entornos de ejecución del pipeline.
# Es consumido por vars/nrtcEnterprisePipeline.groovy junto con pipeline.yaml.
# Su resultado se complementa con deployment-groups.yaml para segmentar targets de despliegue.

environments:
  # Entorno de desarrollo para integración continua temprana.
  - name: dev
    branch: develop
    require_approval: false

  # Entorno de staging para validación previa a producción.
  - name: staging
    branch: release
    require_approval: true

  # Entorno de producción para publicación final.
  - name: prod
    branch: main
    require_approval: true
